# Docker Compose 配置
# 作者: Shyu
# 版本: 1.0.0

services:
  # 后端服务 (NestJS)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: prepare-for-api
    ports:
      - "42123:42123"
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/api:/app
      - ./前端面试题汇总:/app/前端面试题汇总
    restart: unless-stopped
    networks:
      - prepare-for-network

  # 前端服务 (Next.js)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: prepare-for-web
    ports:
      - "33980:33980"
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - prepare-for-network
    depends_on:
      - api

networks:
  prepare-for-network:
    driver: bridge
